    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        .logo-font { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        .hero-bg {
            background: linear-gradient(90deg, rgba(34,197,94,0.92), rgba(134,239,172,0.88)), 
                        url('images/20260413_171807.jpg') center/cover no-repeat;
        }
        
        .nav-link:after {
            content: ''; 
            position: absolute; 
            width: 0; 
            height: 3px; 
            bottom: -2px; 
            left: 0; 
            background: #22c55e;
            transition: width 0.3s ease;
        }
        .nav-link:hover:after { 
            width: 100%; 
        }

        /* Custom Logo */
        .custom-logo {
            position: relative;
            width: 52px;
            height: 52px;
        }
        .custom-logo .square {
            width: 33px;
            height: 33px;
            background: #2c3e50;
            border-radius: 10px;
            position: absolute;
            top: 10px;
            left: 8px;
            z-index: 2;
        }
        .custom-logo .triangle {
            position: absolute;
            width: 17px;
            height: 17px;
            border-right: 30px solid #22c55e;
            left: 23px;
            border-radius: 20px;
            z-index: 1;
            bottom: 8px;
            transform: rotate(130deg);
        }

        .product-card {
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <h1 class="text-5xl font-bold logo-font mb-2">Farm Shop</h1>
        <p class="text-gray-600 text-lg">Seeds, Tools, Fertilizers, Machinery, Fresh Produce, Animal Products & More — Delivered across Malawi</p>

        <!-- Search and Filters -->
        <div class="flex flex-col md:flex-row gap-4 mt-8 mb-10">
            <input 
                type="text" 
                id="search-input"
                onkeyup="filterProducts()"
                placeholder="Search products... (e.g. maize, sprayer, fertilizer, cassava, eggs, chicks)"
                class="flex-1 px-6 py-4 border rounded-3xl focus:outline-none focus:border-green-500">
            
            <div class="flex gap-3 flex-wrap" id="shop-filters">
                <button onclick="filterCategory('all')" class="active px-6 py-3 border rounded-3xl hover:bg-green-50" id="filter-all">All</button>
                <button onclick="filterCategory('seeds')" class="px-6 py-3 border rounded-3xl hover:bg-green-50" id="filter-seeds">Seeds</button>
                <button onclick="filterCategory('tools')" class="px-6 py-3 border rounded-3xl hover:bg-green-50" id="filter-tools">Tools & Machines</button>
                <button onclick="filterCategory('fertilizer')" class="px-6 py-3 border rounded-3xl hover:bg-green-50" id="filter-fertilizer">Fertilizers</button>
                <button onclick="filterCategory('irrigation')" class="px-6 py-3 border rounded-3xl hover:bg-green-50" id="filter-irrigation">Irrigation</button>
                <button onclick="filterCategory('produce')" class="px-6 py-3 border rounded-3xl hover:bg-green-50" id="filter-produce">Fresh Produce</button>
                <button onclick="filterCategory('pesticides')" class="px-6 py-3 border rounded-3xl hover:bg-green-50" id="filter-pesticides">Pesticides</button>
                <button onclick="filterCategory('animal')" class="px-6 py-3 border rounded-3xl hover:bg-green-50" id="filter-animal">Animal Products</button>
            </div>
        </div>

        <!-- Shop Grid -->
        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-8" id="shop-grid"></div>
    </div>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="hidden fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-[100] flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="text-2xl font-semibold">Your Cart</h3>
            <button onclick="toggleCart()" class="text-4xl leading-none">×</button>
        </div>
        <div id="cart-items" class="flex-1 p-6 overflow-auto"></div>
        <div class="p-6 border-t">
            <div class="flex justify-between text-xl font-bold mb-6">
                <span>Total</span>
                <span id="cart-total">MK 0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-3xl text-xl font-medium">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        let shopProducts = [

            {id:104, name:"Heavy Duty Hand Hoe", category:"tools", price:12000, emoji:"🪓", description:"Strong steel blade"},
            {id:105, name:"Knapsack Sprayer 16L", category:"tools", price:72500, emoji:"🧴", description:"Best for pesticides"},
            {id:106, name:"NPK 23-21-0 Fertilizer (50kg)", category:"fertilizer", price:175500, emoji:"🧪", description:"Top dressing fertilizer"},
            {id:107, name:"Urea Fertilizer (50kg)", category:"fertilizer", price:189500, emoji:"🧪", description:"Nitrogen rich"},
            {id:108, name:"DAP Fertilizer (50kg)", category:"fertilizer", price:169500, emoji:"🧪", description:"Planting fertilizer"},
            {id:109, name:"Jab Planter (Manual)", category:"tools", price:142000, emoji:"🌱", description:"Saves time and labor"},
            {id:110, name:"Drip Irrigation Kit (100m)", category:"irrigation", price:150000, emoji:"💧", description:"Water efficient"},
            {id:111, name:"Solar Water Pump (0.5HP)", category:"irrigation", price:480000, emoji:"☀️", description:"For small farms"},
            {id:112, name:"Wheelbarrow (Heavy Duty)", category:"tools", price:180500, emoji:"🛠️", description:"Farm transport"},
            {id:113, name:"Soya Bean Seed (10kg)", category:"seeds", price:36000, emoji:"🫘", description:"High protein variety"},
            {id:114, name:"Tomato Seeds (Improved)", category:"seeds", price:6000, emoji:"🍅", description:"Hybrid variety"},

            // Added Produce (fresh/local Malawi produce)
            {id:115, name:"Fresh Cassava Roots (10kg)", category:"produce", price:12000, emoji:"🥔", description:"Freshly harvested, high quality"},
            {id:116, name:"Sweet Potatoes (50kg)", category:"produce", price:42000, emoji:"🍠", description:"Local orange-fleshed variety"},
            {id:117, name:"Maize bag (50 kgs )", category:"produce", price:43000, emoji:"🌽", description:"Fresh from the field"},
            {id:118, name:"Groundnuts (Raw/shelled, 50kg)", category:"produce", price:175000, emoji:"🥜", description:"Freshly harvested peanuts"},

            {id:121, name:"Bananas Bunch (Medium)", category:"produce", price:6200, emoji:"🍌", description:"Fresh local bananas"},
            {id:122, name:"Irish Potatoes (50kg)", category:"produce", price:120000, emoji:"🥔", description:"Highland variety"},

            // Added more Products (seeds, fertilizers, tools, pesticides, livestock items)
            {id:123, name:"Hybrid Rice Seed (5kg)", category:"seeds", price:65000, emoji:"🌾", description:"High yielding rice variety"},
            {id:124, name:"Bean Seed (Common, 5kg)", category:"seeds", price:72000, emoji:"🫘", description:"Improved disease resistant"},
            {id:125, name:"Sunflower Seed (5kg)", category:"seeds", price:33800, emoji:"🌻", description:"Oilseed variety"},
            {id:126, name:"Cabbage Seeds (Packet)", category:"seeds", price:4800, emoji:"🥬", description:"Hybrid cabbage"},

            {id:129, name:"Pesticide - Insecticide (1L)", category:"pesticides", price:32500, emoji:"🧴", description:"For common crop pests"},
            {id:130, name:"Herbicide (1L)", category:"pesticides", price:30000, emoji:"🌿", description:"Weed control"},
            {id:131, name:"Fungicide (500ml)", category:"pesticides", price:24500, emoji:"🧪", description:"Crop disease protection"},
            {id:132, name:"Panga Knife / Machete", category:"tools", price:9000, emoji:"🔪", description:"Heavy duty farm knife"},

            {id:136, name:"Chicken Feed (25kg)", category:"tools", price:150000, emoji:"🐔", description:"Layer / broiler feed"},
            {id:138, name:"Protective Gloves & Goggles Set", category:"tools", price:4500, emoji:"🧤", description:"Safety gear for spraying"},

            // === NEW: Animal Products & Livestock Supplies ===
            {id:139, name:"Fresh Eggs (30 tray)", category:"animal", price:15000, emoji:"🥚", description:"Farm fresh chicken eggs"},
            {id:140, name:"Day Old Chicks (Broiler, 10 pcs)", category:"animal", price:25000, emoji:"🐥", description:"High quality broiler chicks"},
            {id:141, name:"Day Old Chicks (Layer, 10 pcs)", category:"animal", price:45000, emoji:"🐥", description:"Improved layer chicks"},
            {id:142, name:"Fresh Goat Meat ( per kg)", category:"animal", price:12500, emoji:"🐐", description:"Fresh local goat meat"},
            {id:143, name:"Fresh Beef ( per kg)", category:"animal", price:15200, emoji:"🐄", description:"Fresh beef cuts"},
            {id:144, name:"Fresh Milk (20 litres)", category:"animal", price:20000, emoji:"🥛", description:"Pasteurized cow milk"},
            {id:145, name:"Layer Mash Feed (25kg)", category:"animal", price:64800, emoji:"🐔", description:"Complete feed for laying hens"},
            {id:146, name:"Broiler Finisher Feed (25kg)", category:"animal", price:58000, emoji:"🐔", description:"For fast growing broilers"},
            {id:147, name:"Pig Feed (25kg)", category:"animal", price:42000, emoji:"🐖", description:"Balanced pig grower feed"},
            {id:148, name:"Newcastle Disease Vaccine (100-dose vial)", category:"animal", price:6000, emoji:"💉", description:"For poultry disease prevention"},
            {id:149, name:"Dewormer Tablets (Cattle/Goat per tablet)", category:"animal", price:1500, emoji:"💊", description:"Broad spectrum dewormer"},
            {id:150, name:"Milking Bucket & Stool Set", category:"animal", price:62000, emoji:"🪣", description:"Manual milking equipment"},
            {id:151, name:"Fowl Pox Vaccine(per vial)", category:"animal", price:5800, emoji:"💉", description:"Poultry vaccine"},
            {id:152, name:"Cattle Salt Lick Block (5kgs)", category:"animal", price:22000, emoji:"🧂", description:"Essential mineral supplement"},
            {id:153, name:"Poultry Drinkers & Feeders Set", category:"animal", price:21000, emoji:"🐔", description:"For 50 birds"},
            {id:154, name:"Fresh Fish (per kg)", category:"animal", price:6500, emoji:"🐟", description:"Fresh Malawi fish"}
        ];

        let cart = [];

        function renderShop(products) {
            const container = document.getElementById('shop-grid');
            container.innerHTML = products.map(p => `
                <div class="product-card bg-white border border-gray-200 rounded-3xl p-6 hover:border-green-300">
                    <div class="text-7xl text-center mb-6">${p.emoji}</div>
                    <h5 class="font-semibold text-lg leading-tight">${p.name}</h5>
                    <p class="text-sm text-gray-500 mt-2 line-clamp-2">${p.description}</p>
                    <div class="mt-6 flex justify-between items-end">
                        <span class="text-3xl font-bold text-green-700">MK ${p.price.toLocaleString()}</span>
                        <button onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.emoji}')" 
                                class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-3xl text-sm font-medium">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(category) {
            document.querySelectorAll('#shop-filters button').forEach(btn => {
                btn.classList.remove('active', 'border-green-600', 'bg-green-50');
            });
            
            if (category === 'all') {
                document.getElementById('filter-all').classList.add('active', 'border-green-600', 'bg-green-50');
            } else {
                const btn = document.getElementById(`filter-${category}`);
                if (btn) btn.classList.add('active', 'border-green-600', 'bg-green-50');
            }

            const filtered = category === 'all' 
                ? shopProducts 
                : shopProducts.filter(p => p.category === category);
            
            renderShop(filtered);
        }

        function filterProducts() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filtered = shopProducts.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.description.toLowerCase().includes(searchTerm)
            );
            renderShop(filtered);
        }

        function addToCart(id, name, price, emoji) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({id, name, price, emoji, quantity: 1});
            }
            updateCartCount();
            alert(`${name} added to cart!`);
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('hidden');
            if (!sidebar.classList.contains('hidden')) renderCart();
        }

        function renderCart() {
            let total = 0;
            const html = cart.map((item) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <span class="text-2xl">${item.emoji}</span> 
                            <span class="font-medium">${item.name}</span>
                        </div>
                        <div class="text-right">
                            <div class="font-semibold">MK ${itemTotal.toLocaleString()}</div>
                            <div class="text-sm text-gray-500">Qty: ${item.quantity}</div>
                        </div>
                    </div>`;
            }).join('');
            
            document.getElementById('cart-items').innerHTML = html || '<p class="text-center text-gray-400 py-12">Your cart is empty</p>';
            document.getElementById('cart-total').textContent = `MK ${total.toLocaleString()}`;
        }

        function checkout() {
            if (cart.length === 0) return alert("Your cart is empty!");
            alert("✅ Order placed successfully!\n\nThank you for shopping at GreenPulse Agriculture.");
            cart = [];
            updateCartCount();
            toggleCart();
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu) menu.classList.toggle('hidden');
        }

        // Initialize
        window.onload = () => {
            renderShop(shopProducts);
            updateCartCount();
        };
    </script>
</body>
</html>
